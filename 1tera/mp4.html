<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Video Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../tma-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
        #player-container { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .loading-state {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; z-index: 5;
        }
        .loading-state i { font-size: 40px; animation: spin 1s linear infinite; display: block; margin-bottom: 10px; }
        .loading-state p { color: #aaa; font-size: 14px; }
        .error-state {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; padding: 20px; z-index: 5; display: none;
            max-width: 90%; width: 400px;
        }
        .error-state.visible { display: block; }
        .error-state i { font-size: 48px; color: #ff4444; margin-bottom: 15px; display: block; }
        .error-state h3 { font-size: 18px; margin-bottom: 8px; }
        .error-state p { font-size: 14px; color: #aaa; margin-bottom: 15px; line-height: 1.6; }
        .error-state a {
            display: inline-block; padding: 12px 30px;
            background: #ff0000; color: #fff; text-decoration: none; border-radius: 8px;
            font-size: 16px; font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        .error-state a:active { transform: scale(0.97); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="player-container">
        <div class="loading-state" id="loadingState">
            <i class="fas fa-spinner"></i>
            <p>Loading video...</p>
        </div>
        <div class="error-state" id="errorState">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Video Load Failed</h3>
            <p>The video could not be loaded. It may be unavailable or the link has expired.</p>
            <a id="fallbackLink" href="#" target="_blank" rel="noopener">Try opening directly</a>
        </div>
    </div>
    <script>
        (function() {
            'use strict';

            // Telegram Mini App expansion
            if (window.TMA && TMA.ready) {
                if (TMA.isTelegram) {
                    TMA.Viewport.expand();
                    try { TMA.Viewport.requestFullscreen(); } catch (e) { /* not supported */ }
                }
            } else {
                const tg = window.Telegram && window.Telegram.WebApp;
                if (tg) { try { tg.ready(); tg.expand(); } catch (e) { /* silent */ } }
            }

            const params = new URLSearchParams(window.location.search);
            const videoUrl = params.get('q');
            const container = document.getElementById('player-container');
            const loadingEl = document.getElementById('loadingState');
            const errorEl = document.getElementById('errorState');
            const fallbackLink = document.getElementById('fallbackLink');

            if (!videoUrl) {
                loadingEl.style.display = 'none';
                errorEl.querySelector('h3').textContent = 'No Video URL';
                errorEl.querySelector('p').textContent = 'No video URL was provided.';
                fallbackLink.style.display = 'none';
                errorEl.classList.add('visible');
                return;
            }

            // Declare loadTimeout BEFORE the event handlers that reference it
            // (avoids temporal-dead-zone issues if a handler somehow fires synchronously)
            let loadTimeout = null;

            const video = document.createElement('video');
            video.src = videoUrl;
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;';

            video.addEventListener('canplay', () => {
                loadingEl.style.display = 'none';
                if (loadTimeout) { clearTimeout(loadTimeout); loadTimeout = null; }
                if (window.TMA && TMA.haptic) TMA.haptic.light();
            });
            video.addEventListener('playing', () => {
                loadingEl.style.display = 'none';
                if (loadTimeout) { clearTimeout(loadTimeout); loadTimeout = null; }
            });

            video.addEventListener('error', () => {
                loadingEl.style.display = 'none';
                if (loadTimeout) { clearTimeout(loadTimeout); loadTimeout = null; }
                fallbackLink.href = videoUrl;
                errorEl.classList.add('visible');
                if (window.TMA && TMA.haptic) TMA.haptic.error();
            });

            container.appendChild(video);

            loadTimeout = setTimeout(() => {
                if (loadingEl.style.display !== 'none') {
                    loadingEl.style.display = 'none';
                    fallbackLink.href = videoUrl;
                    errorEl.querySelector('h3').textContent = 'Loading Timeout';
                    errorEl.querySelector('p').textContent = 'The video took too long to load. Try opening it directly.';
                    errorEl.classList.add('visible');
                    if (window.TMA && TMA.haptic) TMA.haptic.error();
                }
            }, 30000);

            // Clean up on page hide to prevent memory leaks
            window.addEventListener('pagehide', () => {
                try {
                    if (loadTimeout) { clearTimeout(loadTimeout); loadTimeout = null; }
                    video.pause();
                    video.src = '';
                    video.load();
                } catch (e) { /* silent */ }
            });
        })();
    </script>
</body>
</html>
