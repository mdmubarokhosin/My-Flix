<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Video Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff0000;
            --primary-dark-hover: #c0392b; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: pan-y;
        }

        .app-container {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            overflow: hidden;
            background-color: #111;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loader {
            position: absolute;
            top: 46%;
            left: 42.4%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
        }

        .loader::after,
        .loader::before {
            content: '';  
            box-sizing: border-box;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #FFF;
            position: absolute;
            left: 0;
            top: 0;
            animation: animloader 2s linear infinite;
        }

        .loader::after {
            animation-delay: 1s;
        }

        @keyframes animloader {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .progress-container {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: 30px;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 15px;
            user-select: none;
        }

        .progress-track {
            flex-grow: 1;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            position: relative;
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background-color: #ff0050;
            width: 0%;
            border-radius: 2px;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-handle {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background-color: #ff0050;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .progress-container:hover .progress-handle,
        .progress-container.dragging .progress-handle {
            opacity: 1;
        }

        .time-display {
            font-size: 12px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            min-width: 45px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 10px;
            margin: 0 5px;
            pointer-events: none;
        }

        .right-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: absolute;
            right: 15px;
            bottom: 100px;
        }

        .right-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            padding: 5px;
            outline: none;
        }

        .right-btn span {
            font-size: 12px;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .balance-btn {
            width: 55px;
            height: 55px;
            background-color: var(--primary-color);
            border-radius: 50%;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.7);
        }

        .balance-btn i {
            font-size: 20px;
            color: #fff;
        }

        .balance-btn span {
            font-size: 14px;
            font-weight: bold;
            margin-top: 2px;
            color: #fff;
        }

        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .center-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .play-pause-center {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }

        .user-info {
            position: absolute;
            bottom: 45px;
            left: 20px;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .username {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .video-description {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .hashtags {
            color: #1da1f2;
            font-size: 14px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #060000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #060000;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .modal-icon {
            font-size: 48px;
            color: #f39c12;
            margin-bottom: 15px;
        }

        .modal-body {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-footer {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
        }
        
        .modal-button.earn, .modal-button.buy {
            background-color: var(--primary-color);
        }
        .modal-button.earn:hover, .modal-button.buy:hover {
            background-color: var(--primary-dark-hover);
        }

        /* Swipe Animations */
        .swipe-up-animation {
            animation: swipeUpOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .swipe-down-animation {
            animation: swipeDownOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .swipe-up-enter {
            animation: swipeUpIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .swipe-down-enter {
            animation: swipeDownIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes swipeUpOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100%); opacity: 0; }
        }
        @keyframes swipeDownOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
        @keyframes swipeUpIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes swipeDownIn {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>
<body>
    <div class="app-container">
        <a href="index.html" style="position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.6);color:#fff;padding:8px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:600;backdrop-filter:blur(8px);display:inline-flex;align-items:center;gap:6px"><i class="fas fa-arrow-left"></i> Home</a>
        <div class="video-container" id="videoContainer"></div>
    </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
    try {
        Telegram.WebApp.ready();
        Telegram.WebApp.MainButton.hide();
    } catch(e) {
        console.error("Telegram WebApp script not found or failed to initialize.");
    }
    
    const tgParams = (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe) ? Telegram.WebApp.initDataUnsafe.start_param : null;
    const startVideoId = tgParams ? parseInt(tgParams) : null;

    const config = {
        videosJsonUrl: '18videos.json',
        preloadCount: 3,
        centerControlsTimeout: 2000,
        skipSeconds: 10,
        earnUrl: '/earn.html',
        buyUrl: '/redeem.html'
    };

    const state = {
        videos: [],
        allVideos: [], 
        currentIndex: 0,
        watchedVideos: new Set(),
        currentVideoElement: null,
        preloadedVideos: new Set(),
        isMuted: false,
        isDraggingProgress: false,
        centerControlsTimeout: null,
        paramVideoId: startVideoId,
        lastWatchedIndex: 0,
        isParamVideoPlaying: false,
        userBalance: 0,
        videosLeftOnPass: 0, 
    };

    const videoContainer = document.getElementById('videoContainer');
    init();

    function init() {
        state.userBalance = parseInt(localStorage.getItem('userBalance')) || 0;
        state.videosLeftOnPass = parseInt(localStorage.getItem('videosLeftOnPass')) || 0;
        showIntroScreen();
    }
    
    function showIntroScreen() {
        // Dynamically create styles for the intro screen
        const style = document.createElement('style');
        style.textContent = `
            .intro-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background-color: rgba(0, 0, 0, 0.85);
                display: flex; justify-content: center; align-items: center;
                z-index: 2000;
            }
            .intro-content {
                background-color: #2c3e50;
                padding: 30px; border-radius: 12px; width: 90%; max-width: 380px;
                text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
                border-top: 5px solid var(--primary-color);
            }
            .intro-content h2 { font-size: 24px; margin-bottom: 15px; }
            .intro-content .receipt { font-size: 18px; margin-bottom: 25px; line-height: 1.6; }
            .intro-content .receipt span { color: #f1c40f; font-weight: bold; font-size: 22px; }
            .intro-button {
                display: block; width: 100%; padding: 15px; border: none;
                border-radius: 8px; font-size: 18px; font-weight: bold;
                cursor: pointer; transition: all 0.3s; color: white;
                margin-top: 10px;
            }
            .intro-button.start { background-color: #2ecc71; }
            .intro-button.start:hover { background-color: #27ae60; }
            .intro-button.start:disabled { background-color: #95a5a6; cursor: not-allowed; }
            .intro-button.secondary { background-color: #e74c3c; }
            .intro-button.secondary:hover { background-color: #c0392b; }
        `;
        document.head.appendChild(style);

        const overlay = document.createElement('div');
        overlay.className = 'intro-overlay';
        
        const watchableVideos = state.userBalance * 2 + state.videosLeftOnPass;
        
        let buttonsHtml;
        if (state.userBalance > 0 || state.videosLeftOnPass > 0) {
            buttonsHtml = `<button class="intro-button start" id="startBtn">Get Started</button>`;
        } else {
            buttonsHtml = `
                <button class="intro-button start" id="startBtn" disabled>Get Started</button>
                <button class="intro-button secondary" id="earnBtn"><i class="fas fa-coins"></i> Earn Coin</button>
                <button class="intro-button secondary" id="buyBtn"><i class="fas fa-shopping-cart"></i> Buy Coin</button>
            `;
        }

        overlay.innerHTML = `
            <div class="intro-content">
                <h2>Welcome!</h2>
                <p class="receipt">
                    You have <span>${state.userBalance}</span> coins.<br>
                    You can watch a total of <strong><span>${watchableVideos}</span></strong> videos.
                </p>
                <div class="intro-footer">
                    ${buttonsHtml}
                </div>
            </div>
        `;

        document.body.appendChild(overlay);
        
        const startBtn = document.getElementById('startBtn');
        if (startBtn && !startBtn.disabled) {
            startBtn.addEventListener('click', () => {
                document.body.removeChild(overlay);
                style.remove(); // Clean up the added styles
                startVideoPlayer();
            });
        }

        const earnBtn = document.getElementById('earnBtn');
        if (earnBtn) earnBtn.addEventListener('click', () => window.location.href = config.earnUrl);

        const buyBtn = document.getElementById('buyBtn');
        if (buyBtn) buyBtn.addEventListener('click', () => window.location.href = config.buyUrl);
    }
    
    async function startVideoPlayer() {
        videoContainer.innerHTML = '<div class="loader" style="display: block;"></div>';

        const watched = localStorage.getItem('watchedVideos');
        if (watched) state.watchedVideos = new Set(JSON.parse(watched));
        const lastIndex = localStorage.getItem('lastWatchedIndex');
        if (lastIndex !== null) state.lastWatchedIndex = parseInt(lastIndex);
        const muted = localStorage.getItem('videoMuted');
        if (muted !== null) state.isMuted = JSON.parse(muted);

        try {
            const response = await fetch(config.videosJsonUrl);
            state.allVideos = await response.json(); 

            if (startVideoId !== null) {
                const paramVideoIndex = state.allVideos.findIndex(v => v.id === startVideoId);
                if (paramVideoIndex !== -1) {
                    state.videos = state.allVideos;
                    state.isParamVideoPlaying = true;
                    loadVideo(paramVideoIndex);
                    setupTouchEvents();
                    return; 
                }
            }
            
            state.videos = state.allVideos; 
            filterWatchedVideos();

            if (state.videos.length > 0) {
                const startingIndex = state.lastWatchedIndex < state.videos.length ? state.lastWatchedIndex : 0;
                loadVideo(startingIndex);
            } else {
                state.watchedVideos.clear();
                localStorage.removeItem('watchedVideos');
                state.videos = state.allVideos;
                loadVideo(0);
            }
        } catch (error) {
            console.error('Error loading videos:', error);
            showErrorMessage();
        }
        setupTouchEvents();
    }

    function filterWatchedVideos() {
        if (state.watchedVideos.size === 0) return;
        const unwatchedVideos = state.videos.filter(video => !state.watchedVideos.has(video.id));
        if (unwatchedVideos.length > 0) state.videos = unwatchedVideos;
    }

    function loadVideo(index) {
        if (!state.isParamVideoPlaying) {
            if (state.videosLeftOnPass <= 0) {
                if (state.userBalance > 0) {
                    state.userBalance--;
                    localStorage.setItem('userBalance', state.userBalance.toString());
                    state.videosLeftOnPass = 2;
                } else {
                    showNoBalanceModal();
                    return;
                }
            }
            state.videosLeftOnPass--;
            localStorage.setItem('videosLeftOnPass', state.videosLeftOnPass.toString());
        }
        
        if (index < 0 || index >= state.videos.length) index = (state.videos.length > 0) ? 0 : -1;
        if (index === -1) { showNoVideosMessage(); return; }
        
        actuallyLoadVideo(index);
    }
    
    function showNoBalanceModal() {
        if (document.querySelector('.modal-overlay')) return;
        const modalOverlay = document.createElement('div');
        modalOverlay.className = 'modal-overlay';
        modalOverlay.innerHTML = `
            <div class="modal-content">
                <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="modal-body">You have an insufficient balance. Please top up or earn more coins.</div>
                <div class="modal-footer">
                    <button class="modal-button earn" id="earnCoinBtn"><i class="fas fa-coins"></i> Earn Coin</button>
                    <button class="modal-button buy" id="buyCoinBtn"><i class="fas fa-shopping-cart"></i> Buy Coin</button>
                </div>
            </div>`;
        document.body.appendChild(modalOverlay);
        document.getElementById('earnCoinBtn').addEventListener('click', () => window.location.href = config.earnUrl);
        document.getElementById('buyCoinBtn').addEventListener('click', () => window.location.href = config.buyUrl);
    }

    function actuallyLoadVideo(index) {
        // Cleanup: pause and remove old video to prevent memory leaks
        const oldVideo = videoContainer.querySelector('video');
        if (oldVideo) { oldVideo.pause(); oldVideo.src = ''; oldVideo.load(); }
        videoContainer.innerHTML = '';
        const videoData = state.videos[index];
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        const video = document.createElement('video');
        video.playsInline = true; video.autoplay = true; video.muted = state.isMuted; video.loop = true; video.src = videoData.url;
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.setAttribute('preload', 'auto');
        const loader = document.createElement('div');
        loader.className = 'loader';
        const progressContainer = document.createElement('div');
        progressContainer.className = 'progress-container';
        progressContainer.innerHTML = `
            <div class="time-display">0:00</div>
            <div class="progress-track"><div class="progress-bar"><div class="progress-handle"></div></div></div>
            <div class="time-display">0:00</div>`;
        const centerControls = document.createElement('div');
        centerControls.className = 'center-controls';
        centerControls.innerHTML = '<button class="play-pause-center"><i class="fas fa-pause"></i></button>';
        const rightControls = document.createElement('div');
        rightControls.className = 'right-controls';
        rightControls.innerHTML = `
            <button class="right-btn balance-btn"><i class="fas fa-dollar-sign"></i><span>${state.userBalance}</span></button>
            <button class="right-btn like-btn"><i class="far fa-heart"></i><span>${((videoData.id * 37 + 42) % 999) + 1}</span></button>
            <button class="right-btn mute-btn"><i class="fas ${state.isMuted ? 'fa-volume-mute' : 'fa-volume-up'}"></i><span>Sound</span></button>
            <button class="right-btn share-btn"><i class="far fa-share-square"></i><span>Share</span></button>
            <button class="right-btn skip-btn"><i class="fas fa-forward"></i><span>+10s</span></button>`;
        const userInfo = document.createElement('div');
        userInfo.className = 'user-info';
        userInfo.innerHTML = `
            <div class="username">🔥All Video Hub ~ ${videoData.id}</div>
            <div class="video-description">Check out this awesome video!</div>
            <div class="hashtags">#tiktokSex #Sexy #NSFW</div>`;
        videoWrapper.append(video, loader, progressContainer, centerControls, rightControls, userInfo);
        videoContainer.appendChild(videoWrapper);
        state.currentIndex = index;
        if (!state.isParamVideoPlaying) {
             markVideoAsWatched(videoData.id);
             saveLastWatchedIndex(index);
        }
        setupVideoEvents(video, videoWrapper, loader, videoData.id);
        preloadAdjacentVideos(index);
    }
    
    function setupVideoEvents(video, wrapper, loader, videoId) {
        const playPauseCenter = wrapper.querySelector('.play-pause-center');
        const muteBtn = wrapper.querySelector('.mute-btn');
        const likeBtn = wrapper.querySelector('.like-btn');
        const shareBtn = wrapper.querySelector('.share-btn');
        const skipBtn = wrapper.querySelector('.skip-btn');
        const centerControls = wrapper.querySelector('.center-controls');
        const progressContainer = wrapper.querySelector('.progress-container');
        const progressBar = progressContainer.querySelector('.progress-bar');
        const progressTrack = progressContainer.querySelector('.progress-track');
        const [currentTimeDisplay, durationDisplay] = progressContainer.querySelectorAll('.time-display');

        video.addEventListener('waiting', () => loader.style.display = 'block');
        video.addEventListener('playing', () => { loader.style.display = 'none'; playPauseCenter.innerHTML = '<i class="fas fa-pause"></i>'; });
        video.addEventListener('canplay', () => loader.style.display = 'none');
        video.addEventListener('pause', () => { playPauseCenter.innerHTML = '<i class="fas fa-play"></i>'; });
        video.addEventListener('error', () => {
            loader.style.display = 'none';
            console.warn('Video failed to load, skipping:', video.src);
            // Auto-skip to next video after brief delay
            setTimeout(() => playNextVideo(), 1000);
        });

        const updateProgress = () => {
            if (!state.isDraggingProgress && !isNaN(video.duration)) {
                progressBar.style.width = `${(video.currentTime / video.duration) * 100}%`;
                currentTimeDisplay.textContent = formatTime(video.currentTime);
                durationDisplay.textContent = formatTime(video.duration);
            }
        };
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        video.addEventListener('ended', playNextVideo);

        const togglePlayPause = () => { if (video.paused) video.play().catch(console.error); else video.pause(); showCenterControls(centerControls); };
        wrapper.addEventListener('click', (e) => { if (!e.target.closest('.right-controls, .user-info, .play-pause-center, .progress-container')) togglePlayPause(); });
        playPauseCenter.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation(); state.isMuted = !state.isMuted; video.muted = state.isMuted;
            muteBtn.innerHTML = `<i class="fas ${state.isMuted ? 'fa-volume-mute' : 'fa-volume-up'}"></i><span>Sound</span>`;
            localStorage.setItem('videoMuted', JSON.stringify(state.isMuted));
        });
        likeBtn.addEventListener('click', (e) => {
            e.stopPropagation(); const icon = likeBtn.querySelector('i'); const count = likeBtn.querySelector('span');
            if (icon.classList.contains('far')) { icon.classList.replace('far', 'fas'); count.textContent = parseInt(count.textContent) + 1; }
            else { icon.classList.replace('fas', 'far'); count.textContent = Math.max(0, parseInt(count.textContent) - 1); }
        });
        shareBtn.addEventListener('click', (e) => {
            e.stopPropagation(); const shareUrl = `https://t.me/share/url?url=https://t.me/All_Videos_hub_bot/tiktok?startapp=${videoId}`;
            try { Telegram.WebApp.openTelegramLink(shareUrl); } catch(e) { console.error(e); }
        });
        skipBtn.addEventListener('click', (e) => { e.stopPropagation(); video.currentTime = Math.min(video.currentTime + config.skipSeconds, video.duration); });
        wrapper.querySelector('.balance-btn')?.addEventListener('click', (e) => { e.stopPropagation(); window.location.href = config.earnUrl; });

        const seek = (clientX) => { if (isNaN(video.duration)) return; const rect = progressTrack.getBoundingClientRect(); video.currentTime = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * video.duration; updateProgress(); };
        const dragStart = (e) => { e.stopPropagation(); state.isDraggingProgress = true; progressContainer.classList.add('dragging'); seek(e.clientX || e.touches[0].clientX); };
        const dragMove = (e) => { if (state.isDraggingProgress) seek(e.clientX || e.touches[0].clientX); };
        const dragEnd = () => { if (state.isDraggingProgress) { state.isDraggingProgress = false; progressContainer.classList.remove('dragging'); if(video.paused) video.play().catch(console.error); } };
        progressContainer.addEventListener('mousedown', dragStart); progressContainer.addEventListener('touchstart', dragStart, { passive: true });
        document.addEventListener('mousemove', dragMove); document.addEventListener('touchmove', dragMove, { passive: true });
        document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);
        new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { if(video.paused) video.play().catch(e => { playPauseCenter.innerHTML = '<i class="fas fa-play"></i>'; }); }
                else { video.pause(); }
            });
        }, { threshold: 0.7 }).observe(wrapper);
    }

    function showCenterControls(centerControls) {
        centerControls.classList.add('visible');
        clearTimeout(state.centerControlsTimeout);
        state.centerControlsTimeout = setTimeout(() => centerControls.classList.remove('visible'), config.centerControlsTimeout);
    }
    
    function playNextVideo() {
        let nextIndex;
        if (state.isParamVideoPlaying) {
            state.isParamVideoPlaying = false; 
            state.videos = state.allVideos; filterWatchedVideos();
            const lastWatchedVideoId = state.allVideos[state.lastWatchedIndex]?.id;
            let resumeIndex = state.videos.findIndex(v => v.id === lastWatchedVideoId);
            nextIndex = (resumeIndex === -1) ? 0 : resumeIndex + 1;
        } else {
            nextIndex = state.currentIndex + 1;
        }
        if (nextIndex >= state.videos.length) {
            state.watchedVideos.clear(); localStorage.removeItem('watchedVideos');
            state.videos = state.allVideos; nextIndex = 0; 
        }
        if (state.videos.length > 0) loadVideo(nextIndex);
        else { state.watchedVideos.clear(); localStorage.removeItem('watchedVideos'); state.videos = state.allVideos; loadVideo(0); }
    }

    function playPreviousVideo() {
        if (state.isParamVideoPlaying) state.isParamVideoPlaying = false;
        let prevIndex = state.currentIndex - 1;
        if (prevIndex >= 0) loadVideo(prevIndex);
    }

    function preloadAdjacentVideos(currentIndex) {
        for (let i = 1; i <= config.preloadCount; i++) {
            const nextIndex = currentIndex + i;
            if (nextIndex < state.videos.length && !state.preloadedVideos.has(nextIndex)) {
                preloadVideo(nextIndex); state.preloadedVideos.add(nextIndex);
            }
        }
    }

    function preloadVideo(index) {
        if (index < 0 || index >= state.videos.length) return;
        const video = document.createElement('video');
        video.src = state.videos[index].url; video.preload = 'auto';
    }

    let touchEventsSetup = false;
    function setupTouchEvents() {
        if (touchEventsSetup) return;
        touchEventsSetup = true;
        let startY = 0, deltaY = 0, currentVideoWrapper = null, isSwiping = false;
        document.body.addEventListener('touchstart', (e) => {
            if (state.isDraggingProgress) return;
            isSwiping = true; startY = e.touches[0].clientY; deltaY = 0;
            currentVideoWrapper = videoContainer.querySelector('.video-wrapper');
            if(currentVideoWrapper) currentVideoWrapper.style.transition = 'none';
        }, { passive: true });
        document.body.addEventListener('touchmove', (e) => {
            if (!isSwiping || !currentVideoWrapper) return;
            deltaY = e.touches[0].clientY - startY;
            currentVideoWrapper.style.transform = `translateY(${deltaY}px)`;
        }, { passive: true });
        document.body.addEventListener('touchend', () => {
            if (!isSwiping || !currentVideoWrapper) return;
            isSwiping = false;
            if (currentVideoWrapper) {
                currentVideoWrapper.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                if (Math.abs(deltaY) > window.innerHeight / 4) {
                     if (deltaY < 0) animateAndChangeVideo(currentVideoWrapper, 'up');
                     else if (deltaY > 0) animateAndChangeVideo(currentVideoWrapper, 'down');
                } else {
                    currentVideoWrapper.style.transform = 'translateY(0)';
                }
            }
        });
    }

    function animateAndChangeVideo(wrapper, direction) {
        const isUp = direction === 'up';
        const canGoNext = isUp;
        const canGoPrev = !isUp && state.currentIndex > 0;
        if ((isUp && !canGoNext) || (!isUp && !canGoPrev)) {
             wrapper.style.transform = 'translateY(0)'; return;
        }
        wrapper.classList.add(isUp ? 'swipe-up-animation' : 'swipe-down-animation');
        wrapper.addEventListener('animationend', () => wrapper.parentNode?.removeChild(wrapper), { once: true });
        if (isUp) playNextVideo(); else playPreviousVideo();
        setTimeout(() => { videoContainer.querySelector('.video-wrapper')?.classList.add(isUp ? 'swipe-up-enter' : 'swipe-down-enter'); }, 0);
    }

    function markVideoAsWatched(videoId) {
        state.watchedVideos.add(videoId);
        localStorage.setItem('watchedVideos', JSON.stringify(Array.from(state.watchedVideos)));
    }

    function saveLastWatchedIndex(index) {
        const videoId = state.videos[index]?.id;
        if (videoId) {
            const originalIndex = state.allVideos.findIndex(v => v.id === videoId);
            if (originalIndex !== -1) {
                state.lastWatchedIndex = originalIndex;
                localStorage.setItem('lastWatchedIndex', originalIndex.toString());
            }
        }
    }

    function formatTime(seconds) {
        if(isNaN(seconds) || seconds < 0) return "0:00";
        const mins = Math.floor(seconds / 60); const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function showNoVideosMessage() { videoContainer.innerHTML = '<div style="color: white; text-align: center; padding: 20px;">No new videos available. Come back later! 💋</div>'; }
    function showErrorMessage() { videoContainer.innerHTML = '<div style="color: white; text-align: center; padding: 20px;">Oops! Error loading videos. Please try again later. 😘</div>'; }
});
</script>

    /* Font Awesome already loaded in <head> */
    const style = document.createElement('style');
    style.textContent = `
  #reliableBackBtn {
    position: fixed; bottom: 42px; right: 20px; width: 50px; height: 50px;
    background-color: #ff0000; color: white; border-radius: 50%; border: none;
    cursor: pointer; box-shadow: 0 2px 10px rgba(231, 76, 60, 0.5); z-index: 999;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    transition: all 0.2s ease;
  }
  #reliableBackBtn:hover { background-color: #c0392b; transform: scale(1.05); }
  #reliableBackBtn:active { transform: scale(0.95); }
  #reliableBackBtn.loading { pointer-events: none; opacity: 0.8; }
  #reliableBackBtn.loading i { animation: spin 0.6s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
`;
    document.head.appendChild(style);
    if (!document.getElementById('reliableBackBtn')) {
        const button = document.createElement('button');
        button.id = 'reliableBackBtn';
        button.innerHTML = '<i class="fas fa-arrow-left"></i>';
        document.body.appendChild(button);
        function handleNavigation() {
            if (button.classList.contains('loading')) return;
            button.classList.add('loading');
            button.innerHTML = '<i class="fas fa-spinner"></i>';
            setTimeout(() => { window.location.href = 'index.html'; }, 100);
        }
        button.addEventListener('click', handleNavigation);
        button.addEventListener('touchstart', (e) => { e.preventDefault(); handleNavigation(); }, { passive: false });
    }
</script>
